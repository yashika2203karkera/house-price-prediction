<!DOCTYPE html>
<html>
<head>
    <title>House Price Prediction</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 400px;
            margin: 80px auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            color: #333;
            margin-bottom: 25px;
        }

        label {
            display: block;
            text-align: left;
            margin-top: 10px;
            font-weight: bold;
            color: #444;
        }

        input[type="number"] {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input[type="number"]:focus {
            border-color: #2575fc;
            outline: none;
            box-shadow: 0 0 5px rgba(37,117,252,0.5);
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background: #2575fc;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #1a5ed8;
        }

        h3 {
            margin-top: 20px;
            color: #222;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>House Price Prediction</h2>

        <form action="/predict" method="post">
            <label>Bedrooms:</label>
            <input type="number" step="any" name="bedrooms" required>

            <label>Bathrooms:</label>
            <input type="number" step="any" name="bathrooms" required>

            <label>Lot Size (sqft_lot):</label>
            <input type="number" step="any" name="sqft_lot" required>

            <button type="submit">Predict</button>
        </form>

        <h3>{{ prediction_text }}</h3>
    </div>

</body>
</html>
